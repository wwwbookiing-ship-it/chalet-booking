<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حجز الشاليهات</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .box {
      width: calc(100% - 40px);
      max-width: 420px;
      background: #ffffff;
      padding: 30px 20px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
    }

    p {
      color: #666;
      line-height: 1.8;
    }

    .status {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 10px;
      background: #e8f8ef;
      color: #16864b;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>موقع حجز الشاليهات</h1>
    <p>تم ربط المشروع وتجهيز الصفحة الأساسية بنجاح.</p>
    <div class="status">الموقع يعمل</div>
  </div>
</body>
</html>
